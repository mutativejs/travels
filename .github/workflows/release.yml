name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release
  queue: max
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: yarn install --frozen-lockfile
      - name: Verify release tag
        run: |
          version="$(node -p "require('./package.json').version")"
          if [ "${GITHUB_REF_NAME}" != "v${version}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version v${version}."
            exit 1
          fi
      - run: yarn playwright install --with-deps chromium
      - run: yarn build
      - run: yarn test:types
      - run: yarn test:examples
      - run: yarn test
      - run: yarn test:browser
      - run: yarn test:e2e:types
      - run: yarn test:e2e:ci
      - run: yarn coverage
      - run: yarn benchmark:ci

  build-pages:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
      - run: yarn install --frozen-lockfile
      - run: yarn build:doc:site

  publish-npm:
    runs-on: ubuntu-latest
    needs: [test, build-pages]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
      - run: yarn install --frozen-lockfile
      - run: yarn build
      - run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}
          CI: true

  request-pages-deploy:
    runs-on: ubuntu-latest
    needs: publish-npm
    timeout-minutes: 20
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Dispatch API Docs deployment
        id: dispatch-pages
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_REF: ${{ github.ref_name }}
        run: |
          requested_at="$(date -u -d '30 seconds ago' +%Y-%m-%dT%H:%M:%SZ)"
          echo "run_name=API Docs for ${RELEASE_REF}" >> "${GITHUB_OUTPUT}"
          echo "requested_at=${requested_at}" >> "${GITHUB_OUTPUT}"
          curl --fail-with-body --show-error --silent \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Content-Type: application/json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/docs.yml/dispatches" \
            --data "{\"ref\":\"main\",\"inputs\":{\"release_ref\":\"${RELEASE_REF}\"}}"
      - name: Wait for API Docs deployment
        env:
          GH_TOKEN: ${{ github.token }}
          REQUESTED_AT: ${{ steps.dispatch-pages.outputs.requested_at }}
          RUN_NAME: ${{ steps.dispatch-pages.outputs.run_name }}
        run: |
          for attempt in $(seq 1 90); do
            response="$(curl --fail-with-body --show-error --silent \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/docs.yml/runs?event=workflow_dispatch&branch=main&per_page=20")"
            run_info="$(printf '%s' "${response}" | node -e '
              const fs = require("fs");
              const payload = JSON.parse(fs.readFileSync(0, "utf8"));
              const run = (payload.workflow_runs || []).find((candidate) =>
                candidate.display_title === process.env.RUN_NAME &&
                candidate.created_at >= process.env.REQUESTED_AT
              );
              if (run) {
                console.log([run.id, run.status, run.conclusion || "", run.html_url].join("\u001f"));
              }
            ')"
            if [ -n "${run_info}" ]; then
              IFS=$'\037' read -r run_id status conclusion html_url <<< "${run_info}"
              echo "API Docs run ${run_id}: ${html_url} (${status}${conclusion:+/${conclusion}})"
              if [ "${status}" = "completed" ]; then
                if [ "${conclusion}" = "success" ]; then
                  exit 0
                fi
                echo "API Docs deployment failed with conclusion ${conclusion}."
                exit 1
              fi
            else
              echo "Waiting for API Docs run to start..."
            fi
            sleep 10
          done

          echo "Timed out waiting for API Docs deployment."
          exit 1
